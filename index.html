<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
        overflow: hidden;
    }

    .container {
        background: rgba(255,255,255,0.95);
        padding: 40px;
        border-radius: 25px;
        width: 350px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        animation: fadeIn 1s ease;
        position: relative;
    }

    h2 {
        margin-bottom: 10px;
        font-size: 28px;
    }

    p {
        font-size: 18px;
        color: #444;
    }

    button {
        padding: 12px 25px;
        margin: 10px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    .main-btn {
        background: linear-gradient(45deg, #ff4e50, #ff6a88);
        color: white;
        box-shadow: 0 5px 15px rgba(255,0,100,0.4);
    }

    .main-btn:hover {
        transform: scale(1.1);
    }

    .yes {
        background: linear-gradient(45deg, #56ab2f, #a8e063);
        color: white;
    }

    .no {
        background: linear-gradient(45deg, #ff416c, #ff4b2b);
        color: white;
        position: absolute;
    }

    @keyframes fadeIn {
        from {opacity:0; transform:translateY(20px);}
        to {opacity:1; transform:translateY(0);}
    }

    /* قلوب طايرة 💖 */
    .heart {
        position: fixed;
        bottom: -10px;
        font-size: 20px;
        animation: floatUp 4s linear infinite;
        color: pink;
    }

    @keyframes floatUp {
        0% {transform: translateY(0); opacity:1;}
        100% {transform: translateY(-100vh); opacity:0;}
    }
</style>
</head>

<body>


<div class="container">
    <h2>Hi Toty</h2>
    <p id="message">I just wanted to say something...</p>

    <button id="nextBtn" onclick="nextStep()">Continue ➡️</button>

    <div id="final" style="display:none;">
        <h3>Will you go on a date with me? 🥹</h3>
        <button class="yes" onclick="answerYes()">Yes 😍</button>
        <button class="no" id="noBtn">No 😔</button>
    </div>
</div>

<script>
let step = 0;

function nextStep() {
    step++;

    if(step == 1){
        document.getElementById("message").innerText =
        "Enta 3aref en ana ma2drsh ab3d 3nk sah?";
    }
    else if(step == 2){
        document.getElementById("message").innerText =
        "W 3aref en malish gheirak... w ba7ebak enta bs, sah? ";
    }
    else if(step == 3){
        document.getElementById("message").innerText =
        "Enta 3aref enk gozy... w ana mahma 7asal ma2drsh ast7mel bo3dak ";
    }
    else if(step == 4){
        document.getElementById("message").innerText =
        "ana mlesh gherk wlahe w m2drsh ab3d 3nk ";
    }
    else if(step == 5){
        document.getElementById("message").innerText =
        "W kol youm bafakar feek w bfkr f 3laktna w arfa eny fl akher enta el wahed el htkon gnbe";
    }
    else if(step == 6){
        document.getElementById("message").innerText =
        "Momken nedy nafsna forsa tany? 🥹";
    }
    else {
        document.getElementById("message").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("final").style.display = "block";
    }
}


// زرار NO بيهرب 😂
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", function() {
    let x = Math.random() * 200 - 100;
    let y = Math.random() * 200 - 100;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

// حتى لو حاول يدوس عليه
noBtn.addEventListener("click", function() {
    alert("No option is not available 😏");
});

function answerYes(){
    document.querySelector(".container").innerHTML = `
        <h2>Finally 😍💖</h2>
        <p>You said YES 🙄</p>
        <p style="font-size:20px;">
            It's okay, let's meet on Friday 10/4 for our date 😍
            BAHEBAAK
        </p>
        <p>I'll waiting for you</p>
        <p>BAHEBAAK</p>
        <p>📍Location:it's a scret</p>
        
    `;

    // قلوب تطلع 💖
    setInterval(createHeart, 300);
}

// animation قلوب
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(()=>{ heart.remove(); }, 4000);
}
</script>

</body>
</html>
